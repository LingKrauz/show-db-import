name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

env:
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: src/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: src/frontend
        run: npm run lint

  deploy_backend:
    runs-on: ubuntu-latest
    name: Publish & deploy backend
    outputs:
      backend_app_name: ${{ steps.discover-backend-app.outputs.backend_app_name }}
      backend_host: ${{ steps.get-backend-hostname.outputs.backend_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required variables
        run: |
          missing=()
          [ -z "$RESOURCE_GROUP" ] && missing+=("AZURE_RESOURCE_GROUP")
          [ -z "$ENVIRONMENT" ] && missing+=("ENVIRONMENT")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing repository variables: ${missing[*]}. Go to Settings > Variables > Actions to configure them."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish backend project
        working-directory: src/backend
        run: dotnet publish -c Release -o publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Discover backend App Service
        id: discover-backend-app
        run: |
          backend_app_name=$(az webapp list --resource-group "$RESOURCE_GROUP" --query "[?tags.repository=='show-db-import' && tags.service=='backend' && tags.component=='api' && tags.environment=='${ENVIRONMENT}'].name | [0]" -o tsv)
          if [ -z "$backend_app_name" ]; then
            echo "::error::No backend App Service found in resource group '$RESOURCE_GROUP' for environment '$ENVIRONMENT'. Provision infrastructure first so the Bicep tags are applied."
            exit 1
          fi
          echo "backend_app_name=$backend_app_name" >> "$GITHUB_OUTPUT"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.discover-backend-app.outputs.backend_app_name }}
          package: src/backend/publish

      - name: Get backend hostname
        id: get-backend-hostname
        run: |
          hostname=$(az webapp show --name "${{ steps.discover-backend-app.outputs.backend_app_name }}" --resource-group "$RESOURCE_GROUP" --query defaultHostName -o tsv)
          if [ -z "$hostname" ]; then
            echo "::error::No hostname found for app '${{ steps.discover-backend-app.outputs.backend_app_name }}' in resource group '$RESOURCE_GROUP'"
            exit 1
          fi
          echo "backend_host=$hostname" >> "$GITHUB_OUTPUT"

      - name: Azure logout
        run: az logout

  build_and_deploy_frontend:
    needs: [lint, deploy_backend]
    runs-on: ubuntu-latest
    name: Build and deploy frontend
    environment:
      name: Production
      url: ${{ steps.deploy-to-azure.outputs.static_web_app_url }}
    concurrency:
      group: static-web-apps-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: src/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: https://${{ needs.deploy_backend.outputs.backend_host }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        id: deploy-to-azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "src/frontend"
          api_location: ""
          output_location: ".next"

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set backend CORS origin
        run: |
          az webapp config appsettings set \
            --name "${{ needs.deploy_backend.outputs.backend_app_name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --settings "FrontendUrl=${{ steps.deploy-to-azure.outputs.static_web_app_url }}"

      - name: Azure logout
        run: az logout
