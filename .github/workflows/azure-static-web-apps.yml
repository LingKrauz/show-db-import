name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

env:
  BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_APP_NAME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & type-check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: src/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: src/frontend
        run: npm run lint

  deploy_backend:
    runs-on: ubuntu-latest
    name: Publish & deploy backend
    outputs:
      backend_host: ${{ steps.get-backend-hostname.outputs.backend_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate backend app name
        run: |
          if [ -z "$BACKEND_APP_NAME" ]; then
            echo "::error::AZURE_BACKEND_APP_NAME repository variable is not set. Go to Settings > Variables > Actions to configure it."
            exit 1
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish backend project
        working-directory: src/backend
        run: dotnet publish -c Release -o publish

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.BACKEND_APP_NAME }}
          package: src/backend/publish

      - name: Get backend hostname
        id: get-backend-hostname
        run: |
          hostname=$(az webapp list --query "[?name=='$BACKEND_APP_NAME'] | [0].defaultHostName" -o tsv)
          if [ -z "$hostname" ]; then
            echo "::error::No hostname found for app '$BACKEND_APP_NAME'"
            az webapp list --query "[?contains(name, '$BACKEND_APP_NAME')].{name:name,resourceGroup:resourceGroup,defaultHostName:defaultHostName}" -o table || true
            exit 1
          fi
          echo "backend_host=$hostname" >> "$GITHUB_OUTPUT"

      - name: Azure logout
        run: az logout

  build_and_deploy_frontend:
    needs: [lint, deploy_backend]
    runs-on: ubuntu-latest
    name: Build and deploy frontend
    environment:
      name: Production
      url: ${{ steps.deploy-to-azure.outputs.static_web_app_url }}
    concurrency:
      group: static-web-apps-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: src/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/frontend
        env:
          NEXT_PUBLIC_API_URL: https://${{ needs.deploy_backend.outputs.backend_host }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        id: deploy-to-azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "src/frontend"
          api_location: ""
          output_location: ".next"
