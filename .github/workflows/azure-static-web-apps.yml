name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

# when the backend app service name changes you can override by
# setting AZURE_BACKEND_APP_NAME in the repo or workflow environment.
# authenticate using a service principal with secrets:
# - AZURE_CREDENTIALS (JSON with clientId, clientSecret, subscriptionId, tenantId)
# - AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & type‑check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: src/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (lint)
        working-directory: src/frontend
        run: npm ci

      - name: Run ESLint
        working-directory: src/frontend
        run: npm run lint

  deploy_backend:
    needs: lint
    runs-on: ubuntu-latest
    name: Publish & deploy backend
    outputs:
      backend_host: ${{ steps.get-backend-hostname.outputs.backend_host }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Publish backend project
        working-directory: src/backend
        run: dotnet publish -c Release -o publish

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_BACKEND_APP_NAME || 'show-db-import-d4gjfzaqcqb6b4gu.eastus2-01' }}
          package: src/backend/publish

      - name: Get backend hostname
        id: get-backend-hostname
        run: |
          appName="${{ secrets.AZURE_BACKEND_APP_NAME || 'show-db-import-d4gjfzaqcqb6b4gu.eastus2-01' }}"
          # Use `az webapp list` and filter by name to avoid requiring a resource group
          hostname=$(az webapp list --query "[?name=='$appName'] | [0].defaultHostName" -o tsv)
          if [ -z "$hostname" ]; then
            echo "No hostname found for $appName" >&2
            az webapp list --query "[?contains(name, '$appName')].{name:name,resourceGroup:resourceGroup,defaultHostName:defaultHostName}" -o table || true
            exit 1
          fi
          echo "backend_host=$hostname" >> $GITHUB_OUTPUT

      - name: Azure logout
        run: az logout

  build_and_deploy_job:
    needs: [lint, deploy_backend]
    runs-on: ubuntu-latest
    name: Build and Deploy to production
    environment:
      name: Production
      url: ${{ steps.deploy-to-azure.outputs.web_url }}
    concurrency:
      group: static-web-apps-production
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: src/frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('src/frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        working-directory: src/frontend
        run: npm ci

      - name: Configure frontend API URL
        run: |
          # Use hostname discovered from the backend deployment
          echo "NEXT_PUBLIC_API_URL=https://${{ needs.deploy_backend.outputs.backend_host }}" >> $GITHUB_ENV

      - name: Build frontend
        working-directory: src/frontend
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        id: deploy-to-azure
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: "src/frontend"
          api_location: ""
          output_location: ".next"
